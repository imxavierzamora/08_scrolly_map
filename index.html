<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MapLibre Scrollytelling Demo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .story-block {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 1rem 2rem;
    }

    .story-card {
      width: 100%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.08);
    }

    .map-column {
      position: relative;
      min-height: 100vh;
    }

    .map-fixed {
      position: fixed;
      top: 0;
      right: 0;
      z-index: -1;
      width: 100%;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row">
      
      <!-- Story cards holder-->
      <div class="col-12 col-lg-5 story-column" id="story">

        <!-- the first story block hard-coded. The others are generated -->
        <section class="story-block intro-block">
          <div class="story-card" data-card-type="intro">
            <h2 class="h4 mb-3 text-center">Welcome to My Story Map</h2>
            <p class="mb-0 text-center">Let me take you on a journey</p>
          </div>
        </section>

      </div>

      <!-- Map holder -->
      <div class="col-12 map-column">
        <div class="map-fixed">
          <div id="map"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const locations = [
      {
        title: "Amoeba Records",
        lat: 37.865903,
        lon: -122.258285,
        zoom: 6,
        description: "Indie music lovers' hangout for free live shows & an eclectic stock of new releases & vintage hits."
      },

      {
        title: "Rasputin Music",
        lat: 37.866709,
        lon: -122.258524,
        zoom: 6,
        description: "Music-store chain trading in new & used CDs, DVDs & video games, plus collectible vinyl records."
      },

      {
        title: "1-2-3-4 Go! Records",
        lat: 37.828799,
        lon: -122.260409,
        zoom: 6,
        description: "Independent record store known for its selection of obscure titles & on-site music performances."
      },

      {
        title: "The Stacks Record Shop",
        lat: 37.672468,
        lon: -122.083029,
        zoom: 6,
        description: "Our mission is to create an inclusive, community-driven space that celebrates and supports independent music culture by preserving the art of vinyl and crate-digging. "
      },

      {
        title: "Groove Merchant Records",
        lat: 37.771628,
        lon: -122.433331,
        zoom: 6,
        description: "Locally owned compact shop offers new & used records with special emphasis on soul, funk & hip-hop."
      },

      {
        title: "Rooky Ricardo's Records",
        lat: 37.772087,
        lon: -122.429318,
        zoom: 6,
        description: "Hip vinyl shop boasts a variety of classic records & listening stations in a compact colorful venue."
      },

      {
        title: "I Hate Records",
        lat: 37.772097,
        lon: -122.429167,
        zoom: 6,
        description: "We specialize in punk, but also carry pretty much every genre. Along with vinyl, we carry tapes, CDs, T-shirts, vintage clothing, studs/spikes, patches, local art, posters, and all sorts of strange knick knacks."
      },

      {
        title: "101 Music",
        lat: 37.799990,
        lon: -122.407313,
        zoom: 6,
        description: "Venue for used records & CDs in a wide range of genres, plus musical instruments & posters."
      }
    ]; //YOU NEED TO EDIT THIS LINE FOR THE MAP TO WORK


    //Check out other basemap options here: https://madewithmaplibre.com/basemaps/gallery
    const map = new maplibregl.Map({
      container: "map",
      style: "https://tiles.openfreemap.org/styles/positron",
    });



    //disable all interactions with the map
    map.scrollZoom.disable();
    map.dragPan.disable();
    map.dragRotate.disable();
    map.touchZoomRotate.disable();
    map.doubleClickZoom.disable();
    map.keyboard.disable();

    // Add markers
    locations.forEach(location => {
      new maplibregl.Marker()
        .setLngLat([location.lon, location.lat])
        .addTo(map);
    });

    // Build bounds for opening overview
    const openingBounds = new maplibregl.LngLatBounds();
    locations.forEach(location => {
      openingBounds.extend([location.lon, location.lat]);
    });

    const storyContainer = document.querySelector("#story");

    locations.forEach((location, index) => {
      const block = document.createElement("section");
      block.className = "story-block";

      block.innerHTML = `
        <div class="story-card" data-card-type="location" data-location-index="${index}">
          <h2 class="h4 mb-3">${location.title}</h2>
          <p class="mb-0">${location.description}</p>
        </div>
      `;

      storyContainer.appendChild(block);
    });

    const introCard = document.querySelector('.story-card[data-card-type="intro"]');
    const allCards = document.querySelectorAll("#story .story-card");

    let activeState = null;

    function showOpeningOverview(animated = true) {
      if (activeState === "intro") return;
      activeState = "intro";

      map.fitBounds(openingBounds, {
        padding: { top: 80, right: 80, bottom: 80, left: 80 },
        maxZoom: 5,
        duration: animated ? 1200 : 0
      });
    }

    function activateLocation(locationIndex) {
      if (activeState === locationIndex) return;

      const location = locations[locationIndex];
      if (!location) return;

      activeState = locationIndex;

      map.flyTo({
        center: [location.lon, location.lat],
        zoom: location.zoom,
        speed: 0.9,
        curve: 1.2,
        essential: true
      });
    }

    function getClosestCardToViewportMiddle() {
      const viewportMid = window.innerHeight / 2;
      let closestCard = null;
      let closestDistance = Infinity;

      allCards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const cardCenter = rect.top + (rect.height / 2);
        const distance = Math.abs(cardCenter - viewportMid);

        if (distance < closestDistance) {
          closestDistance = distance;
          closestCard = card;
        }
      });

      return closestCard;
    }

    function updateMapFromScroll() {
      const closestCard = getClosestCardToViewportMiddle();
      if (!closestCard) return;

      const cardType = closestCard.dataset.cardType;

      if (cardType === "intro") {
        showOpeningOverview();
        return;
      }

      if (cardType === "location") {
        const locationIndex = Number(closestCard.dataset.locationIndex);
        activateLocation(locationIndex);
      }
    }

  
    const observer = new IntersectionObserver(
      entries => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            updateMapFromScroll();
            break;
          }
        }
      },
      {
        root: null,
        rootMargin: "-45% 0px -45% 0px",
        threshold: 0
      }
    );

    allCards.forEach(card => observer.observe(card));

    window.addEventListener("scroll", updateMapFromScroll, { passive: true });
    window.addEventListener("resize", updateMapFromScroll);

    map.on("load", () => {
      showOpeningOverview(false);
    });
  </script>
</body>
</html>
